# 1. The "Hello World" Text
  - interval: 5s
    then:
      - lambda: |-
          uint32_t now = millis();
          auto update_ble = [](lv_obj_t *label, uint32_t last_ms, uint32_t now) {
            if (last_ms == 0) {
              lv_label_set_text(label, "No data");
              lv_obj_set_style_text_color(label, lv_color_hex(0xFF4444), 0);
              return;
            }
            uint32_t age_s = (now - last_ms) / 1000;
            if (age_s < 120) {
              char buf[32];
              snprintf(buf, sizeof(buf), "Online (%lus)", (unsigned long)age_s);
              lv_label_set_text(label, buf);
              lv_obj_set_style_text_color(label, lv_color_hex(0x00CC66), 0);
            } else {
              char buf[32];
              snprintf(buf, sizeof(buf), "Offline (%lus)", (unsigned long)age_s);
              lv_label_set_text(label, buf);
              lv_obj_set_style_text_color(label, lv_color_hex(0xFF4444), 0);
            }
          };
          update_ble(id(ble_mppt_label), id(mppt_last_ms), now);
          update_ble(id(ble_shunt_label), id(shunt_last_ms), now);
          update_ble(id(ble_charger_label), id(charger_last_ms), now);

          // --- Battery alarm sound looping ---
          if (id(bat_alarm_active)) {
            uint32_t elapsed = now - id(bat_alarm_start_ms);
            if (elapsed < 120000) {
              // Re-trigger beep every 5s for 2 minutes
              id(rtttl_player)->stop();
              id(rtttl_player)->play("beep:d=16,o=6,b=140:c,p,c,p,c");
            }
          }

  - interval: 1s
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (!time.is_valid()) return;
          char buf[16];

          // Screensaver clock update
          if (id(screen_state) == 2 && id(screensaver_mode) == 1) {
            snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(ss_time_label), buf);
            const char* months[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
            char dbuf[20];
            snprintf(dbuf, sizeof(dbuf), "%d %s %d", time.day_of_month, months[time.month - 1], time.year);
            lv_label_set_text(id(ss_date_label), dbuf);
            float soc = id(shunt_soc).state;
            if (!std::isnan(soc)) {
              char sbuf[16];
              snprintf(sbuf, sizeof(sbuf), "%.0f %%", soc);
              lv_label_set_text(id(ss_soc_label), sbuf);
            }
          }

  - interval: 30s
    then:
      - lambda: |-
          uint32_t uptime_s = millis() / 1000;
          char buf[32];
          if (uptime_s < 3600) {
            snprintf(buf, sizeof(buf), "%lum %lus", (unsigned long)(uptime_s / 60), (unsigned long)(uptime_s % 60));
          } else if (uptime_s < 86400) {
            snprintf(buf, sizeof(buf), "%luh %lum", (unsigned long)(uptime_s / 3600), (unsigned long)((uptime_s % 3600) / 60));
          } else {
            snprintf(buf, sizeof(buf), "%lud %luh", (unsigned long)(uptime_s / 86400), (unsigned long)((uptime_s % 86400) / 3600));
          }
          lv_label_set_text(id(info_uptime_label), buf);

  - interval: 1s
    then:
      - lambda: |-
          if (!id(ping_running)) return;
          id(ping_count)++;
          uint32_t start = millis();
          int sock = lwip_socket(AF_INET, SOCK_STREAM, 0);
          if (sock < 0) {
            lv_label_set_text(id(ping_latest_label), "Sock err");
            lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0xFF4444), 0);
          } else {
            struct timeval tv;
            tv.tv_sec = 3;
            tv.tv_usec = 0;
            lwip_setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
            struct sockaddr_in addr;
            memset(&addr, 0, sizeof(addr));
            addr.sin_family = AF_INET;
            addr.sin_port = htons(53);
            addr.sin_addr.s_addr = ipaddr_addr("192.168.0.1");
            int ret = lwip_connect(sock, (struct sockaddr *)&addr, sizeof(addr));
            uint32_t elapsed = millis() - start;
            lwip_close(sock);
            if (ret == 0) {
              id(ping_ok_count)++;
              id(ping_total_ms) += elapsed;
              if (elapsed < id(ping_min_ms)) id(ping_min_ms) = elapsed;
              if (elapsed > id(ping_max_ms)) id(ping_max_ms) = elapsed;
              char buf[32];
              snprintf(buf, sizeof(buf), "%lu ms", (unsigned long)elapsed);
              lv_label_set_text(id(ping_latest_label), buf);
              lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0x00CC66), 0);
            } else {
              lv_label_set_text(id(ping_latest_label), "Timeout");
              lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0xFF4444), 0);
            }
          }
          // Update stats labels
          int cnt = id(ping_count);
          int ok = id(ping_ok_count);
          char stats[32];
          snprintf(stats, sizeof(stats), "%d/%d OK", ok, cnt);
          lv_label_set_text(id(ping_stats_label), stats);
          if (ok == cnt) {
            lv_obj_set_style_text_color(id(ping_stats_label), lv_color_hex(0x00CC66), 0);
          } else {
            lv_obj_set_style_text_color(id(ping_stats_label), lv_color_hex(0xFF4444), 0);
          }
          if (ok > 0) {
            uint32_t avg = id(ping_total_ms) / ok;
            char minmax[64];
            snprintf(minmax, sizeof(minmax), "Min %lu · Avg %lu · Max %lu ms",
              (unsigned long)id(ping_min_ms), (unsigned long)avg, (unsigned long)id(ping_max_ms));
            lv_label_set_text(id(ping_minmax_label), minmax);
          }
          // Also update main page label
          if (ok > 0) {
            uint32_t avg = id(ping_total_ms) / ok;
            char buf[48];
            snprintf(buf, sizeof(buf), "%d/%d · %lums", ok, cnt, (unsigned long)avg);
            lv_label_set_text(id(ping_result_label), buf);
            lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0x00CC66), 0);
          } else {
            char buf[32];
            snprintf(buf, sizeof(buf), "0/%d OK", cnt);
            lv_label_set_text(id(ping_result_label), buf);
            lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0xFF4444), 0);
          }

button:
  - platform: restart
    id: restart_button
    name: "Restart"

text_sensor:
  - platform: wifi_info
    ip_address:
      id: device_ip
      on_value:
        - lambda: |-
            lv_label_set_text(id(info_ip_label), x.c_str());
    ssid:
      id: device_ssid
  - platform: version
    id: device_version
    hide_timestamp: true
  # --- Victron BLE text sensors ---
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Device State"
    type: DEVICE_STATE
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT Device State"
    id: mppt_device_state
    type: DEVICE_STATE
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT Charger Error"
    id: mppt_charger_error
    type: CHARGER_ERROR
  - platform: victron_ble
    victron_ble_id: victron_charger
    name: "Mains Device State"
    id: mains_device_state
    type: DEVICE_STATE
  - platform: victron_ble
    victron_ble_id: victron_charger
    name: "Mains Charger Error"
    id: mains_charger_error
    type: CHARGER_ERROR

sensor:
  - platform: debug
    free:
      name: "Heap Free"
      id: heap_free
      on_value:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "%.0f KB", x / 1024.0);
            lv_label_set_text(id(info_heap_label), buf);
    psram:
      name: "PSRAM Free"
      id: psram_free

  # 2. Internal Temperature of the ESP32 Chip
  - platform: internal_temperature
    id: cpu_temp_sensor
    name: "Dashboard CPU Temp"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: temp_arc
          value: !lambda "return (int)x;"

  # 3. WiFi Signal Strength (Useful for parking the van!)
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "Van WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: wifi_value_label
          text:
            format: "%.0f dBm"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: wifi_arc
          value: !lambda "return (int)x;"

  # 4. Uptime (How long since last reboot)
  - platform: uptime
    name: "Dashboard Uptime"
    entity_category: "diagnostic"

  # --- Victron SmartShunt (battery_monitor) ---
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Battery Voltage"
    id: shunt_voltage
    type: BATTERY_VOLTAGE
    on_value:
      - lambda: |-
          id(shunt_last_ms) = millis();
          if (!std::isnan(x)) shunt_voltage_hist.record(x, id(sntp_time).now().timestamp);
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Battery Current"
    id: shunt_current
    type: BATTERY_CURRENT
    on_value:
      - lambda: |-
          if (!std::isnan(x)) shunt_current_hist.record(x, id(sntp_time).now().timestamp);
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Time To Go"
    id: shunt_ttg
    type: TIME_TO_GO
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Consumed Ah"
    id: shunt_consumed_ah
    type: CONSUMED_AH
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt Temperature"
    id: shunt_temperature
    type: TEMPERATURE
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Shunt SOC"
    id: shunt_soc
    type: STATE_OF_CHARGE
    on_value:
      - lambda: |-
          if (!std::isnan(x)) shunt_soc_hist.record(x, id(sntp_time).now().timestamp);

  # --- Victron MPPT (solar_charger) ---
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT PV Power"
    id: mppt_pv_power
    type: PV_POWER
    on_value:
      - lambda: |-
          id(mppt_last_ms) = millis();
          if (!std::isnan(x)) solar_power_hist.record(x, id(sntp_time).now().timestamp);
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT Battery Current"
    id: mppt_battery_current
    type: BATTERY_CURRENT
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT Battery Power"
    id: mppt_battery_power
    type: BATTERY_POWER
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "MPPT Yield Today"
    id: mppt_yield_today
    type: YIELD_TODAY

  # --- Victron Mains Charger (ac_charger) ---
  - platform: victron_ble
    victron_ble_id: victron_charger
    name: "Mains Battery Voltage"
    id: mains_voltage
    type: BATTERY_VOLTAGE
    on_value:
