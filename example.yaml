      name: "Heap Free"
      id: heap_free
      on_value:
        - lambda: |-
            char buf[32];
            snprintf(buf, sizeof(buf), "%.0f KB", x / 1024.0);
            lv_label_set_text(id(info_heap_label), buf);
    psram:
      name: "PSRAM Free"
      id: psram_free

  # 2. Internal Temperature of the ESP32 Chip
  - platform: internal_temperature
    id: cpu_temp_sensor
    name: "Dashboard CPU Temp"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: temp_arc
          value: !lambda "return (int)x;"

  # 3. WiFi Signal Strength (Useful for parking the van!)
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "Van WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: wifi_value_label
          text:
            format: "%.0f dBm"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: wifi_arc
          value: !lambda "return (int)x;"

