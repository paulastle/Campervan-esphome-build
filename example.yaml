interval:
  - interval: 50ms
    then:
      - lambda: |-
          // Fast poll for touch wake when screen is off
          if (id(screen_state) != 2) return;
          int gpio4 = gpio_get_level(GPIO_NUM_4);
          if (gpio4 == 0) {
            ESP_LOGW("screen", "WAKE: GPIO4 LOW while screen off");
            id(backlight).set_level(1.0);
            id(backlight).turn_on();
            id(lvgl_comp)->set_paused(false, false);
            id(screen_state) = 0;
          }
  - interval: 500ms
    then:
      - lambda: |-
          int state = id(screen_state);
          if (state == 2) return;  // Wake handled by fast poll
          {
            uint32_t idle_ms = lv_disp_get_inactive_time(NULL);
            int dim_s = id(dim_timeout_sec);
            int off_s = id(off_timeout_sec);
            bool settings_open = id(settings_visible);

            if (settings_open) {
              // Don't timeout while settings page is open
              return;
            }

            if (off_s > 0 && idle_ms >= (uint32_t)(off_s * 1000)) {
              ESP_LOGI("screen", "OFF: idle=%ums off_timeout=%ds", idle_ms, off_s);
              id(backlight).set_level(0.0);
              id(backlight).turn_off();
              id(lvgl_comp)->set_paused(true, false);
              id(screen_state) = 2;
            } else if (dim_s > 0 && idle_ms >= (uint32_t)(dim_s * 1000) && state == 0) {
              ESP_LOGI("screen", "DIM: idle=%ums dim_timeout=%ds", idle_ms, dim_s);
              id(backlight).set_level(0.15);
              id(screen_state) = 1;
            } else if (state == 1 && dim_s > 0 && idle_ms < (uint32_t)(dim_s * 1000)) {
              ESP_LOGI("screen", "UNDIM: idle=%ums (touch while dimmed)", idle_ms);
              id(backlight).set_level(1.0);
              id(screen_state) = 0;
            }
          }  // end block

  - interval: 2s
    then:
      - lambda: |-
          // --- Power Flow page + sub-page updates ---
          char buf[32];

          // Read sensors (NaN if not yet received)
          float pv_power = id(mppt_pv_power).state;
          float mains_power = id(mains_battery_power).state;
          float shunt_v = id(shunt_voltage).state;
          float shunt_i = id(shunt_current).state;
          float soc = id(shunt_soc).state;
          float mppt_i = id(mppt_battery_current).state;
          float mains_i = id(mains_battery_current).state;
          float ttg = id(shunt_ttg).state;

          // --- Flow page labels (amps) ---
          if (std::isnan(mppt_i)) {
            lv_label_set_text(id(flow_solar_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", mppt_i);
            lv_label_set_text(id(flow_solar_label), buf);
          }

          if (std::isnan(soc)) {
            lv_label_set_text(id(flow_battery_label), "-- %");
          } else {
            snprintf(buf, sizeof(buf), "%.0f %%", soc);
            lv_label_set_text(id(flow_battery_label), buf);
          }

          if (std::isnan(mains_i)) {
            lv_label_set_text(id(flow_mains_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", mains_i);
            lv_label_set_text(id(flow_mains_label), buf);
          }

          // Van load current = MPPT battery current + Mains battery current - Shunt current
          float van_i = NAN;
          if (!std::isnan(shunt_i)) {
            float mi = std::isnan(mppt_i) ? 0.0f : mppt_i;
            float ci = std::isnan(mains_i) ? 0.0f : mains_i;
            van_i = mi + ci - shunt_i;
            if (van_i < 0) van_i = 0;
          }
          if (std::isnan(van_i)) {
            lv_label_set_text(id(flow_van_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", van_i);
            lv_label_set_text(id(flow_van_label), buf);
          }

          // --- Battery icon: charging vs normal ---
          if (!std::isnan(shunt_i) && shunt_i > 0) {
            lv_label_set_text(id(flow_battery_icon), "\U000F008E");  // mdi-battery-charging
          } else {
            lv_label_set_text(id(flow_battery_icon), "\U000F0079");  // mdi-battery
          }

          // --- Flow line colors (amps threshold) ---
          lv_color_t idle = lv_color_hex(0x333333);
          // Solar line: yellow when > 0.1A
          if (!std::isnan(mppt_i) && mppt_i > 0.1f) {
            lv_obj_set_style_bg_color(id(flow_line_solar), lv_color_hex(0xFFCC00), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_line_solar), idle, 0);
          }
          // Van line: orange when van load > 0.1A
          if (!std::isnan(van_i) && van_i > 0.1f) {
            lv_obj_set_style_bg_color(id(flow_line_van), lv_color_hex(0xFF8800), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_line_van), idle, 0);
          }
          // Mains line: cyan when mains > 0.1A
          if (!std::isnan(mains_i) && mains_i > 0.1f) {
            lv_obj_set_style_bg_color(id(flow_line_mains), lv_color_hex(0x00CCCC), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_line_mains), idle, 0);
          }

          // --- Time-to-go display ---
          if (!std::isnan(ttg) && ttg > 0) {
            int mins = (int)ttg;
            if (mins >= 1440) {
              int days = mins / 1440;
              int hrs = (mins % 1440) / 60;
              snprintf(buf, sizeof(buf), "%dd %dh", days, hrs);
            } else if (mins >= 60) {
              int hrs = mins / 60;
              int m = mins % 60;
              snprintf(buf, sizeof(buf), "%dh %dm", hrs, m);
            } else {
              snprintf(buf, sizeof(buf), "%dm", mins);
            }
            char ttg_buf[48];
            snprintf(ttg_buf, sizeof(ttg_buf), "Discharge Time\n%s", buf);
            lv_label_set_text(id(flow_ttg_label), ttg_buf);
            lv_obj_clear_flag(id(flow_ttg_label), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(flow_ttg_label), LV_OBJ_FLAG_HIDDEN);
          }

          // --- TTG background color alerts on flow page ---
          if (!std::isnan(ttg) && ttg > 0 && ttg < 120) {
            lv_obj_set_style_bg_color(id(flow_page).obj, lv_color_hex(0x440000), 0);
          } else if (!std::isnan(ttg) && ttg > 0 && ttg < 300) {
            lv_obj_set_style_bg_color(id(flow_page).obj, lv_color_hex(0x443300), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_page).obj, lv_color_hex(0x000000), 0);
          }

          // --- Sub-page arcs + labels (still use power sensors) ---
          // Battery sub-page
          if (!std::isnan(soc)) {
            lv_arc_set_value(id(battery_arc), (int)soc);
            snprintf(buf, sizeof(buf), "%.0f %%", soc);
            lv_label_set_text(id(battery_value_label), buf);
          }
          // Solar sub-page
          if (!std::isnan(pv_power)) {
            lv_arc_set_value(id(solar_arc), (int)pv_power);
            snprintf(buf, sizeof(buf), "%.0f W", pv_power);
            lv_label_set_text(id(solar_value_label), buf);
          }
          // Charger sub-page
          if (!std::isnan(mains_power)) {
            lv_arc_set_value(id(charger_arc), (int)mains_power);
            snprintf(buf, sizeof(buf), "%.0f W", mains_power);
            lv_label_set_text(id(charger_value_label), buf);
          }

# 1. The "Hello World" Text
  - interval: 5s
    then:
      - lambda: |-
          uint32_t now = millis();
          auto update_ble = [](lv_obj_t *label, uint32_t last_ms, uint32_t now) {
            if (last_ms == 0) {
              lv_label_set_text(label, "No data");
              lv_obj_set_style_text_color(label, lv_color_hex(0xFF4444), 0);
              return;
            }
            uint32_t age_s = (now - last_ms) / 1000;
            if (age_s < 120) {
              char buf[32];
              snprintf(buf, sizeof(buf), "Online (%lus)", (unsigned long)age_s);
              lv_label_set_text(label, buf);
              lv_obj_set_style_text_color(label, lv_color_hex(0x00CC66), 0);
            } else {
              char buf[32];
              snprintf(buf, sizeof(buf), "Offline (%lus)", (unsigned long)age_s);
              lv_label_set_text(label, buf);
              lv_obj_set_style_text_color(label, lv_color_hex(0xFF4444), 0);
            }
          };
          update_ble(id(ble_mppt_label), id(mppt_last_ms), now);
          update_ble(id(ble_shunt_label), id(shunt_last_ms), now);
          update_ble(id(ble_charger_label), id(charger_last_ms), now);

  - interval: 1s
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (!time.is_valid()) return;
          char buf[16];
          snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
          lv_label_set_text(id(clock_time_label), buf);
          snprintf(buf, sizeof(buf), ":%02d", time.second);
          lv_label_set_text(id(clock_seconds_label), buf);
          const char* months[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
          snprintf(buf, sizeof(buf), "%d %s %d", time.day_of_month, months[time.month - 1], time.year);
          lv_label_set_text(id(clock_date_label), buf);

  - interval: 30s
    then:
      - lambda: |-
          uint32_t uptime_s = millis() / 1000;
          char buf[32];
          if (uptime_s < 3600) {
            snprintf(buf, sizeof(buf), "%lum %lus", (unsigned long)(uptime_s / 60), (unsigned long)(uptime_s % 60));
          } else if (uptime_s < 86400) {
            snprintf(buf, sizeof(buf), "%luh %lum", (unsigned long)(uptime_s / 3600), (unsigned long)((uptime_s % 3600) / 60));
          } else {
            snprintf(buf, sizeof(buf), "%lud %luh", (unsigned long)(uptime_s / 86400), (unsigned long)((uptime_s % 86400) / 3600));
          }
          lv_label_set_text(id(info_uptime_label), buf);

  - interval: 1s
    then:
      - lambda: |-
          if (!id(ping_running)) return;
          id(ping_count)++;
          uint32_t start = millis();
          int sock = lwip_socket(AF_INET, SOCK_STREAM, 0);
          if (sock < 0) {
            lv_label_set_text(id(ping_latest_label), "Sock err");
            lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0xFF4444), 0);
          } else {
            struct timeval tv;
            tv.tv_sec = 3;
            tv.tv_usec = 0;
            lwip_setsockopt(sock, SOL_SOCKET, SO_SNDTIMEO, &tv, sizeof(tv));
            struct sockaddr_in addr;
            memset(&addr, 0, sizeof(addr));
            addr.sin_family = AF_INET;
            addr.sin_port = htons(53);
            addr.sin_addr.s_addr = ipaddr_addr("192.168.0.1");
            int ret = lwip_connect(sock, (struct sockaddr *)&addr, sizeof(addr));
            uint32_t elapsed = millis() - start;
            lwip_close(sock);
            if (ret == 0) {
              id(ping_ok_count)++;
              id(ping_total_ms) += elapsed;
              if (elapsed < id(ping_min_ms)) id(ping_min_ms) = elapsed;
              if (elapsed > id(ping_max_ms)) id(ping_max_ms) = elapsed;
              char buf[32];
              snprintf(buf, sizeof(buf), "%lu ms", (unsigned long)elapsed);
              lv_label_set_text(id(ping_latest_label), buf);
              lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0x00CC66), 0);
            } else {
              lv_label_set_text(id(ping_latest_label), "Timeout");
              lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0xFF4444), 0);
            }
          }
          // Update stats labels
          int cnt = id(ping_count);
          int ok = id(ping_ok_count);
          char stats[32];
          snprintf(stats, sizeof(stats), "%d/%d OK", ok, cnt);
          lv_label_set_text(id(ping_stats_label), stats);
          if (ok == cnt) {
            lv_obj_set_style_text_color(id(ping_stats_label), lv_color_hex(0x00CC66), 0);
          } else {
            lv_obj_set_style_text_color(id(ping_stats_label), lv_color_hex(0xFF4444), 0);
          }
          if (ok > 0) {
            uint32_t avg = id(ping_total_ms) / ok;
            char minmax[64];
            snprintf(minmax, sizeof(minmax), "Min %lu · Avg %lu · Max %lu ms",
              (unsigned long)id(ping_min_ms), (unsigned long)avg, (unsigned long)id(ping_max_ms));
            lv_label_set_text(id(ping_minmax_label), minmax);
          }
          // Also update main page label
          if (ok > 0) {
            uint32_t avg = id(ping_total_ms) / ok;
            char buf[48];
            snprintf(buf, sizeof(buf), "%d/%d · %lums", ok, cnt, (unsigned long)avg);
            lv_label_set_text(id(ping_result_label), buf);
            lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0x00CC66), 0);
          } else {
            char buf[32];
            snprintf(buf, sizeof(buf), "0/%d OK", cnt);
            lv_label_set_text(id(ping_result_label), buf);
            lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0xFF4444), 0);
          }

