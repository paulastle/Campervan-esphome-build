            } else if (soc >= (float)threshold && !id(bat_alarm_armed)) {
              // Re-arm when SOC recovers
              id(bat_alarm_armed) = true;
              ESP_LOGI("alarm", "Battery alarm re-armed: SOC=%.0f%%", soc);
