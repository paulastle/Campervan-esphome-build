              - lambda: |-
                  int vals[] = {0, 10, 15, 20, 25, 30};
                  const char* labels[] = {"Off", "10 %", "15 %", "20 %", "25 %", "30 %"};
                  int current = id(bat_alarm_threshold);
                  int idx = 0;
                  for (int i = 0; i < 6; i++) if (vals[i] == current) { idx = i; break; }
