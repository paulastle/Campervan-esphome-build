lvgl:
  id: lvgl_comp
  displays:
    - main_display
  resume_on_input: false
  page_wrap: false
  top_layer:
    widgets:
      - obj:
          id: dots_container
          align: BOTTOM_MID
          y: -20
          width: 64
          height: 12
          bg_opa: 0%
          border_width: 0
          pad_all: 0
          widgets:
            - obj:
                id: dot0
                x: 0
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0xFFFFFF
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot1
                x: 18
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot2
                x: 36
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot3
                x: 54
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot4
                x: 72
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot5
                x: 90
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
            - obj:
                id: dot6
                x: 108
                y: 0
                width: 10
                height: 10
                radius: 5
                bg_color: 0x555555
                bg_opa: 100%
                border_width: 0
      - obj:
          id: ping_popup
          align: CENTER
          width: 412
          height: 412
          bg_color: 0x000000
          bg_opa: 90%
          border_width: 0
          radius: 206
          pad_all: 0
          opa: LV_OPA_COVER
          hidden: true
          widgets:
            - label:
                align: TOP_MID
                y: 80
                text: "Pinging Gateway"
                text_font: roboto24
                text_color: 0xFFFFFF
            - label:
                id: ping_latest_label
                align: CENTER
                y: -40
                text: "..."
                text_font: roboto48
                text_color: 0x888888
            - label:
                id: ping_stats_label
                align: CENTER
                y: 20
                text: ""
                text_font: roboto24
                text_color: 0x00CC66
            - label:
                id: ping_minmax_label
                align: CENTER
                y: 55
                text: ""
                text_font: roboto24
                text_color: 0x888888
            - button:
                align: CENTER
                y: 120
                width: 80
                height: 80
                radius: 40
                bg_color: 0xCC2222
                border_width: 0
                pad_all: 0
                on_click:
                  - lambda: |-
                      id(ping_running) = false;
                      id(settings_visible) = false;
                      lv_obj_add_flag(id(ping_popup), LV_OBJ_FLAG_HIDDEN);
                      // Update main page label with final summary
                      int cnt = id(ping_count);
                      int ok = id(ping_ok_count);
                      if (cnt > 0 && ok > 0) {
                        uint32_t avg = id(ping_total_ms) / ok;
                        char buf[48];
                        snprintf(buf, sizeof(buf), "%d/%d · %lums", ok, cnt, (unsigned long)avg);
                        lv_label_set_text(id(ping_result_label), buf);
                        lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0x00CC66), 0);
                      } else if (cnt > 0) {
                        char buf[32];
                        snprintf(buf, sizeof(buf), "0/%d OK", cnt);
                        lv_label_set_text(id(ping_result_label), buf);
                        lv_obj_set_style_text_color(id(ping_result_label), lv_color_hex(0xFF4444), 0);
                      }
                widgets:
                  - label:
                      align: CENTER
                      text: "\U000F0156"
                      text_font: mdi48
                      text_color: 0xFFFFFF
            - label:
                align: CENTER
                y: 175
                text: "Stop"
                text_font: roboto24
                text_color: 0xCCCCCC
      - obj:
          id: dns_popup
          align: CENTER
          width: 412
          height: 412
          bg_color: 0x000000
          bg_opa: 90%
          border_width: 0
          radius: 206
          pad_all: 0
          opa: LV_OPA_COVER
          hidden: true
          widgets:
            - label:
                align: TOP_MID
                y: 80
                text: "DNS Resolve\ngoogle.com"
                text_font: roboto24
                text_color: 0xFFFFFF
            - label:
                id: dns_ip_label
                align: CENTER
                y: -50
                text: ""
                text_font: roboto24
                text_color: 0x00CC66
            - label:
                id: dns_latest_label
                align: CENTER
                y: 0
                text: "..."
                text_font: roboto48
                text_color: 0x888888
            - button:
                align: CENTER
                y: 120
                width: 80
                height: 80
                radius: 40
                bg_color: 0x444444
                border_width: 0
                pad_all: 0
                on_click:
                  - lambda: |-
                      lv_obj_add_flag(id(dns_popup), LV_OBJ_FLAG_HIDDEN);
                widgets:
                  - label:
                      align: CENTER
                      text: "\U000F0156"
                      text_font: mdi48
                      text_color: 0xFFFFFF
            - label:
                align: CENTER
                y: 175
                text: "Done"
                text_font: roboto24
                text_color: 0xCCCCCC
  pages:
    # === Page 0: Splash ===
    - id: splash_page
      bg_color: 0x000000
      on_load:
        - lambda: |-
            lv_obj_clear_flag(id(dots_container), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_width(id(dots_container), 64);
            lv_obj_clear_flag(id(dot0), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot1), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot2), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot3), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot4), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot5), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot6), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_bg_color(id(dot0), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_bg_color(id(dot1), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot2), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot3), lv_color_hex(0x555555), 0);
            id(settings_visible) = false;
      on_swipe_left:
        - lambda: |-
            lv_indev_wait_release(lv_indev_get_act());
            id(lvgl_comp)->show_page(15, LV_SCR_LOAD_ANIM_MOVE_LEFT, 200);
      on_swipe_right:
        - lambda: "lv_indev_wait_release(lv_indev_get_act());"
      widgets:
        - label:
            align: CENTER
            y: -30
            text: "\U000F07FA"
            text_font: mdi144
            text_color: 0x00FF88
        - label:
            align: CENTER
            y: 100
            text: "CamperOS"
            text_font: roboto32
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 140
            text: "v9"
            text_font: roboto24
            text_color: 0x666666

    # === Page 1: Power Hub ===
    - id: power_hub
      bg_color: 0x000000
      on_load:
        - lambda: |-
            lv_obj_clear_flag(id(dots_container), LV_OBJ_FLAG_HIDDEN);
