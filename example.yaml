              - lambda: |-
                  // Reset ping state
                  id(ping_count) = 0;
                  id(ping_ok_count) = 0;
                  id(ping_total_ms) = 0;
                  id(ping_min_ms) = UINT32_MAX;
                  id(ping_max_ms) = 0;
                  id(ping_running) = true;
                  id(settings_visible) = true;
                  // Clear popup labels
                  lv_label_set_text(id(ping_latest_label), "...");
                  lv_obj_set_style_text_color(id(ping_latest_label), lv_color_hex(0x888888), 0);
                  lv_label_set_text(id(ping_stats_label), "");
                  lv_label_set_text(id(ping_minmax_label), "");
                  // Show popup
                  lv_obj_clear_flag(id(ping_popup), LV_OBJ_FLAG_HIDDEN);
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F0317"
                  text_font: mdi48
                  text_color: 0x00AAFF
        - label:
            id: ping_result_label
            align: CENTER
            x: -70
            y: 60
            text: "Ping GW"
            text_font: roboto24
            text_color: 0x888888
        # DNS Resolve button
        - button:
            align: CENTER
            x: 70
            y: -10
            width: 90
            height: 90
            radius: 45
            bg_color: 0x222222
            border_width: 0
            pad_all: 0
            on_click:
              - lambda: |-
                  // Show popup with "Resolving..." then do the lookup
                  lv_label_set_text(id(dns_ip_label), "");
                  lv_label_set_text(id(dns_latest_label), "...");
                  lv_obj_set_style_text_color(id(dns_latest_label), lv_color_hex(0x888888), 0);
                  lv_obj_clear_flag(id(dns_popup), LV_OBJ_FLAG_HIDDEN);
                  lv_refr_now(NULL);
                  // Resolve google.com
                  uint32_t start = millis();
                  struct addrinfo hints = {};
                  hints.ai_family = AF_INET;
                  struct addrinfo *res = nullptr;
                  int err = lwip_getaddrinfo("google.com", nullptr, &hints, &res);
                  uint32_t elapsed = millis() - start;
                  if (err == 0 && res != nullptr) {
                    auto *sa = (struct sockaddr_in *)res->ai_addr;
                    uint32_t ip = sa->sin_addr.s_addr;
                    char ip_str[16];
                    snprintf(ip_str, sizeof(ip_str), "%d.%d.%d.%d",
                      (int)(ip & 0xFF), (int)((ip >> 8) & 0xFF),
                      (int)((ip >> 16) & 0xFF), (int)((ip >> 24) & 0xFF));
                    lwip_freeaddrinfo(res);
                    lv_label_set_text(id(dns_ip_label), ip_str);
                    char buf[32];
                    snprintf(buf, sizeof(buf), "%lu ms", (unsigned long)elapsed);
                    lv_label_set_text(id(dns_latest_label), buf);
                    lv_obj_set_style_text_color(id(dns_latest_label), lv_color_hex(0x00CC66), 0);
                  } else {
                    if (res) lwip_freeaddrinfo(res);
                    lv_label_set_text(id(dns_ip_label), "");
                    lv_label_set_text(id(dns_latest_label), "Failed");
                    lv_obj_set_style_text_color(id(dns_latest_label), lv_color_hex(0xFF4444), 0);
                  }
            widgets:
              - label:
                  align: CENTER
                  text: "\U000F01E7"
                  text_font: mdi48
                  text_color: 0x00CC66
        - label:
            align: CENTER
            x: 70
            y: 60
            text: "DNS Test"
            text_font: roboto24
            text_color: 0x888888

