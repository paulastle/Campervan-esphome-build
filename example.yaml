      - obj:
          id: temp_minmax_popup
          align: CENTER
          width: 412
          height: 412
          bg_color: 0x000000
          bg_opa: 90%
          border_width: 0
          radius: 206
          pad_all: 0
          opa: LV_OPA_COVER
          hidden: true
          widgets:
            - label:
                id: minmax_icon_label
                align: CENTER
                y: -100
                text: ""
                text_font: mdi48
                text_color: 0x00FF88
            - label:
                id: minmax_title_label
                align: CENTER
                y: -55
                text: "24h Range"
                text_font: roboto24
                text_color: 0xFFFFFF
            - label:
                id: minmax_min_label
                align: CENTER
                y: -10
                text: ""
                text_font: roboto32
                text_color: 0x44AADD
            - label:
                id: minmax_max_label
                align: CENTER
                y: 35
                text: ""
                text_font: roboto32
                text_color: 0xFF6644
            - button:
                align: CENTER
                y: 110
                width: 80
                height: 80
                radius: 40
                bg_color: 0x444444
                border_width: 0
                pad_all: 0
                on_click:
                  - lambda: |-
                      lv_obj_add_flag(id(temp_minmax_popup), LV_OBJ_FLAG_HIDDEN);
                widgets:
                  - label:
                      align: CENTER
                      text: "OK"
                      text_font: roboto32
                      text_color: 0xFFFFFF
      - obj:
          id: bat_alarm_popup
          align: CENTER
          width: 412
          height: 412
          bg_color: 0x000000
          bg_opa: 90%
          border_width: 0
          radius: 206
          pad_all: 0
          opa: LV_OPA_COVER
          hidden: true
          widgets:
            - label:
                align: CENTER
                y: -100
                text: "\U000F0046"
                text_font: mdi48
                text_color: 0xFF4444
            - label:
                align: CENTER
                y: -55
                text: "Low Battery"
                text_font: roboto32
                text_color: 0xFFFFFF
            - label:
                id: bat_alarm_soc_label
                align: CENTER
                y: -10
                text: ""
                text_font: roboto48
                text_color: 0xFF6644
            - button:
                align: CENTER
                y: 110
                width: 80
                height: 80
                radius: 40
                bg_color: 0xCC2222
                border_width: 0
                pad_all: 0
                on_click:
                  - lambda: |-
                      id(bat_alarm_active) = false;
                      id(rtttl_player)->stop();
                      lv_obj_add_flag(id(bat_alarm_popup), LV_OBJ_FLAG_HIDDEN);
                widgets:
                  - label:
                      align: CENTER
                      text: "OK"
                      text_font: roboto32
                      text_color: 0xFFFFFF
            - label:
                align: CENTER
                y: 175
                text: "Dismiss"
                text_font: roboto24
                text_color: 0xCCCCCC
      - obj:
          id: clock_screensaver
          align: CENTER
          width: 412
          height: 412
          bg_color: 0x000000
          bg_opa: 100%
          border_width: 0
          radius: 206
          pad_all: 0
          hidden: true
          widgets:
            # Big digital time
            - label:
                id: ss_time_label
                align: CENTER
                y: -20
                text: "--:--"
                text_font: roboto96
                text_color: 0x888888
            # Date
            - label:
                id: ss_date_label
                align: CENTER
                y: 55
                text: ""
                text_font: roboto24
                text_color: 0x444444
            # SOC readout
            - label:
                id: ss_soc_label
                align: CENTER
                y: 90
                text: ""
                text_font: roboto32
                text_color: 0x224422
  pages:
    # === Page 0: Splash ===
    - id: splash_page
      bg_color: 0x000000
      on_load:
        - lambda: |-
            lv_obj_clear_flag(id(dots_container), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_width(id(dots_container), 118);
            lv_obj_clear_flag(id(dot0), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot1), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot2), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot3), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot4), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot5), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot6), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_bg_color(id(dot0), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot1), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot2), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot3), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot4), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot5), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot6), lv_color_hex(0xFFFFFF), 0);
            id(settings_visible) = false;
      on_swipe_left:
        - lambda: "lv_indev_wait_release(lv_indev_get_act());"
      on_swipe_right:
        - lambda: |-
            lv_indev_wait_release(lv_indev_get_act());
            id(lvgl_comp)->show_page(3, LV_SCR_LOAD_ANIM_MOVE_RIGHT, 200);
      widgets:
        - label:
            align: CENTER
            y: -30
            text: "\U000F07FA"
            text_font: mdi144
            text_color: 0x00FF88
        - label:
            align: CENTER
            y: 100
            text: "CamperOS"
            text_font: roboto32
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 140
            text: "v9"
            text_font: roboto24
            text_color: 0x666666

    # === Page 1: Power Hub ===
    - id: power_hub
      bg_color: 0x000000
      on_load:
        - lambda: |-
            lv_obj_clear_flag(id(dots_container), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_width(id(dots_container), 64);
            lv_obj_clear_flag(id(dot0), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot1), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot2), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(dot3), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot4), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot5), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(dot6), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_bg_color(id(dot0), lv_color_hex(0x555555), 0);
            lv_obj_set_style_bg_color(id(dot1), lv_color_hex(0xFFFFFF), 0);
