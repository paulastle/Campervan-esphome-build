              int hrs = (mins % 1440) / 60;
              snprintf(buf, sizeof(buf), "%dd %dh", days, hrs);
            } else if (mins >= 60) {
              int hrs = mins / 60;
              int m = mins % 60;
              snprintf(buf, sizeof(buf), "%dh %dm", hrs, m);
            } else {
              snprintf(buf, sizeof(buf), "%dm", mins);
