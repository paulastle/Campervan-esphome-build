interval:
  - interval: 500ms
    then:
      - lambda: |-
          int state = id(screen_state);
          if (state == 2) {
            // Screen is off — poll GPIO4 for touch wake
            int gpio4 = gpio_get_level(GPIO_NUM_4);
            if (gpio4 == 0) {
              ESP_LOGW("screen", "WAKE: GPIO4 LOW while screen off");
              id(backlight).set_level(1.0);
              id(backlight).turn_on();
              id(lvgl_comp)->set_paused(false, false);
              id(screen_state) = 0;
            }
          } else {
            uint32_t idle_ms = lv_disp_get_inactive_time(NULL);
            int dim_s = id(dim_timeout_sec);
            int off_s = id(off_timeout_sec);
            bool settings_open = id(settings_visible);

            if (settings_open) {
              // Don't timeout while settings panel is open
              return;
            }

            if (off_s > 0 && idle_ms >= (uint32_t)(off_s * 1000)) {
              ESP_LOGI("screen", "OFF: idle=%ums off_timeout=%ds", idle_ms, off_s);
              id(backlight).set_level(0.0);
              id(backlight).turn_off();
              id(lvgl_comp)->set_paused(true, false);
              id(screen_state) = 2;
            } else if (dim_s > 0 && idle_ms >= (uint32_t)(dim_s * 1000) && state == 0) {
              ESP_LOGI("screen", "DIM: idle=%ums dim_timeout=%ds", idle_ms, dim_s);
              id(backlight).set_level(0.15);
              id(screen_state) = 1;
            } else if (state == 1 && dim_s > 0 && idle_ms < (uint32_t)(dim_s * 1000)) {
              ESP_LOGI("screen", "UNDIM: idle=%ums (touch while dimmed)", idle_ms);
              id(backlight).set_level(1.0);
              id(screen_state) = 0;
            }
          }

# 1. The "Hello World" Text
text_sensor:
  - platform: template
    name: "Van Dashboard Status"
    icon: "mdi:robot-happy"
    lambda: |-
      return {"Hello World - System Online"};
    update_interval: 60s

sensor:
  # ... (keep your existing Victron/JBD sensors here) ...

  # 2. Internal Temperature of the ESP32 Chip
  - platform: internal_temperature
    id: cpu_temp_sensor
    name: "Dashboard CPU Temp"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: temp_arc
          value: !lambda "return (int)x;"

  # 3. WiFi Signal Strength (Useful for parking the van!)
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "Van WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: wifi_value_label
          text:
            format: "%.0f dBm"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: wifi_arc
          value: !lambda "return (int)x;"

  # 4. Uptime (How long since last reboot)
  - platform: uptime
    name: "Dashboard Uptime"
    entity_category: "diagnostic"

  # 5. Victron MPPT — Solar Panel Power
  - platform: victron_ble
    victron_ble_id: victron_mppt
    name: "Solar Power"
    type: PV_POWER
    on_value:
      - lvgl.label.update:
          id: solar_value_label
          text:
            format: "%.0f W"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: solar_arc
          value: !lambda "return (int)x;"

  # 6. Victron SmartShunt — Battery State of Charge
  - platform: victron_ble
    victron_ble_id: victron_shunt
    name: "Battery SOC"
    type: STATE_OF_CHARGE
    on_value:
      - lvgl.label.update:
          id: battery_value_label
          text:
            format: "%.0f %%"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: battery_arc
          value: !lambda "return (int)x;"

  # 7. Victron Mains Charger — Battery Voltage
  - platform: victron_ble
    victron_ble_id: victron_charger
    name: "Charger Voltage"
    type: BATTERY_VOLTAGE
    on_value:
      - lvgl.label.update:
          id: charger_value_label
          text:
            format: "%.1f V"
            args: [ 'x' ]
      - lvgl.arc.update:
          id: charger_arc
          value: !lambda "return (int)x;"
