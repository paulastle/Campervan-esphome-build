esphome:
  name: esphome-web-2a4114
  friendly_name: Campervan32
  min_version: 2025.11.0
  name_add_mac_suffix: false
  includes:
    - includes/net_test.h
    - includes/temp_history.h
  on_boot:
    - priority: -100
      then:
        - delay: 300ms
        - lambda: |-
            id(touch_glue).begin();
            van_temp_hist.init();
            outside_temp_hist.init();
            fridge_temp_hist.init();
            solar_power_hist.init();
            shunt_voltage_hist.init();
            shunt_soc_hist.init();
            shunt_current_hist.init();
            mains_power_hist.init();
            mains_current_hist.init();
            // Sync value labels with restored global values
            const char* dim_labels[] = {"Never", "15 sec", "30 sec", "1 min", "2 min"};
            int dim_vals[] = {0, 15, 30, 60, 120};
            for (int i = 0; i < 5; i++) {
              if (dim_vals[i] == id(dim_timeout_sec)) {
                lv_label_set_text(id(dim_value_label),dim_labels[i]);
                break;
              }
            }
            const char* off_labels[] = {"Never", "30 sec", "1 min", "2 min", "5 min"};
            int off_vals[] = {0, 30, 60, 120, 300};
            for (int i = 0; i < 5; i++) {
              if (off_vals[i] == id(off_timeout_sec)) {
                lv_label_set_text(id(off_value_label),off_labels[i]);
                break;
              }
            }
            const char* alarm_labels[] = {"Off", "10 %", "15 %", "20 %", "25 %", "30 %"};
            int alarm_vals[] = {0, 10, 15, 20, 25, 30};
            for (int i = 0; i < 6; i++) {
              if (alarm_vals[i] == id(bat_alarm_threshold)) {
                lv_label_set_text(id(alarm_value_label),alarm_labels[i]);
                break;
              }
            }
            const char* saver_labels[] = {"Off", "Clock", "Flow"};
            lv_label_set_text(id(saver_value_label), saver_labels[id(screensaver_mode)]);
            char bbuf[8];
            snprintf(bbuf, sizeof(bbuf), "%d %%", id(screen_brightness_pct));
            lv_label_set_text(id(screen_bright_label), bbuf);
            snprintf(bbuf, sizeof(bbuf), "%d %%", id(saver_brightness_pct));
            lv_label_set_text(id(saver_bright_label), bbuf);
            lv_label_set_text(id(night_mode_label), id(auto_night_mode) ? "On" : "Off");
            // Boot to Flow page instead of Splash
            id(lvgl_comp)->show_page(15, LV_SCR_LOAD_ANIM_NONE, 0);

packages:
  waveshare_display: github://gjdodd/esphome-packages/waveshare-esp32-s3-touch-lcd-146b.yaml@main

esp32:
  framework:
    sdkconfig_options:
      CONFIG_I2C_SKIP_LEGACY_CONFLICT_CHECK: "y"

globals:
  - id: screen_state
    type: int
    restore_value: no
    initial_value: '0'
  - id: dim_timeout_sec
    type: int
    restore_value: yes
    initial_value: '30'
  - id: off_timeout_sec
    type: int
    restore_value: yes
    initial_value: '60'
  - id: settings_visible
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: mppt_last_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: shunt_last_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: charger_last_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ping_running
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ping_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: ping_ok_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: ping_total_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ping_min_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: ping_max_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: bat_alarm_threshold
    type: int
    restore_value: yes
    initial_value: '20'
  - id: bat_alarm_armed
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: bat_alarm_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: bat_alarm_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: screensaver_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: screensaver_mode
    type: int
    restore_value: yes
    initial_value: '1'
  - id: screen_brightness_pct
    type: int
    restore_value: yes
    initial_value: '100'
  - id: saver_brightness_pct
    type: int
    restore_value: yes
    initial_value: '10'
  - id: screensaver_prev_page
    type: int
    restore_value: no
    initial_value: '15'
  - id: auto_night_mode
    type: int
    restore_value: yes
    initial_value: '0'

i2c:
  frequency: 400kHz

external_components:
  - source: components
  - source: github://Fabian-Schmidt/esphome-victron_ble
    components: [victron_ble]
spd2010_glue:
  id: touch_glue
  width: 412
  height: 412
  int_gpio: 4
  swap_xy: false
  mirror_x: false
  mirror_y: false

# Enable logging
logger:

# Enable Home Assistant API
api:
  reboot_timeout: 0s

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  reboot_timeout: 0s
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: "192.168.0.161"
    gateway: "192.168.0.1"
    subnet: "255.255.255.0"
    dns1: "192.168.0.1"
    dns2: "8.8.8.8"

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: false

victron_ble:
  - id: victron_mppt
    mac_address: !secret victron_mppt_mac
    bindkey: !secret victron_mppt_bindkey
  - id: victron_shunt
    mac_address: !secret victron_shunt_mac
    bindkey: !secret victron_shunt_bindkey
  - id: victron_charger
    mac_address: !secret victron_charger_mac
    bindkey: !secret victron_charger_bindkey

rtttl:
  speaker: i2s_audio_speaker
  id: rtttl_player
  gain: 0.6

time:
  - platform: sntp
    id: sntp_time
    on_time_sync:
      - pcf85063.write_time:
          id: pcf85063_time
  - platform: pcf85063
    id: pcf85063_time
    address: 0x51

debug:
  update_interval: 30s

