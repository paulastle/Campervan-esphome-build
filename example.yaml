esphome:
  name: esphome-web-2a4114
  friendly_name: Campervan32
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: -100
      then:
        - delay: 300ms
        - lambda: |-
            id(touch_glue).begin();

packages:
  waveshare_display: github://gjdodd/esphome-packages/waveshare-esp32-s3-touch-lcd-146b.yaml@main

i2c:
  frequency: 400kHz

external_components:
  - source: components

spd2010_glue:
  id: touch_glue
  width: 412
  height: 412
  int_gpio: 4
  swap_xy: false
  mirror_x: true
  mirror_y: true

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: "192.168.0.161"
    gateway: "192.168.0.1"
    subnet: "255.255.255.0"
    dns1: "192.168.0.1"
    dns2: "8.8.8.8"

font:
  - file: "gfonts://Roboto"
    id: roboto32
    size: 32
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto48
    size: 48
    bpp: 4

lvgl:
  displays:
    - main_display
  page_wrap: true
  pages:
    - id: hello_page
      bg_color: 0x000000
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
      widgets:
        - label:
            align: CENTER
            text: "Hello World"
            text_font: roboto32
            text_color: 0xFFFFFF
        - label:
            align: CENTER
            y: 40
            text: "v7"
            text_font: roboto32
            text_color: 0x888888

    - id: wifi_page
      bg_color: 0x000000
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
      widgets:
        - label:
            align: TOP_MID
            y: 140
            text: "WiFi Signal"
            text_font: roboto32
            text_color: 0x888888
        - label:
            id: wifi_value_label
            align: CENTER
            text: "-- dBm"
            text_font: roboto48
            text_color: 0xFFFFFF

    - id: temp_page
      bg_color: 0x000000
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
      widgets:
        - label:
            align: TOP_MID
            y: 140
            text: "CPU Temp"
            text_font: roboto32
            text_color: 0x888888
        - label:
            id: temp_value_label
            align: CENTER
            text: "-- °C"
            text_font: roboto48
            text_color: 0xFFFFFF

# 1. The "Hello World" Text
text_sensor:
  - platform: template
    name: "Van Dashboard Status"
    icon: "mdi:robot-happy"
    lambda: |-
      return {"Hello World - System Online"};
    update_interval: 60s

sensor:
  # ... (keep your existing Victron/JBD sensors here) ...

  # 2. Internal Temperature of the ESP32 Chip
  - platform: internal_temperature
    id: cpu_temp_sensor
    name: "Dashboard CPU Temp"
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]

  # 3. WiFi Signal Strength (Useful for parking the van!)
  - platform: wifi_signal
    id: wifi_signal_sensor
    name: "Van WiFi Signal"
    update_interval: 60s
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: wifi_value_label
          text:
            format: "%.0f dBm"
            args: [ 'x' ]

  # 4. Uptime (How long since last reboot)
  - platform: uptime
    name: "Dashboard Uptime"
    entity_category: "diagnostic"
