interval:
  - interval: 50ms
    then:
      - lambda: |-
          static uint32_t prev_idle = 0, tap_ms = 0, off_since = 0;
          static int wake_count = 0;
          int state = id(screen_state);
          uint32_t now_ms = millis();

          // Reset off_since when not in OFF state
          if (state != 3) off_since = 0;

          // Skip double-tap detection during first 5s after boot
          if (now_ms < 5000) { prev_idle = lv_disp_get_inactive_time(NULL); return; }

          // Double-tap detection (ON or SCREENSAVER states, not on settings pages)
          if ((state == 0 || state == 2) && !id(settings_visible)) {
            uint32_t idle = lv_disp_get_inactive_time(NULL);
            if (prev_idle > 200 && idle < 50) {
              // New touch detected
              if (tap_ms > 0 && (now_ms - tap_ms) > 100 && (now_ms - tap_ms) < 500) {
                // DOUBLE-TAP → OFF
                ESP_LOGI("screen", "DOUBLE-TAP → OFF from state %d", state);
                if (state == 2 && id(screensaver_mode) == 1) {
                  lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
                }
                id(backlight).set_level(0.0);
                id(backlight).turn_off();
                id(lvgl_comp)->set_paused(true, false);
                id(screen_state) = 3;
                tap_ms = 0;
              } else {
                tap_ms = now_ms;
              }
            }
            // Single-tap timeout: wake from screensaver after 500ms
            // Only accept taps that occurred after screensaver started
            if (state == 2 && tap_ms > id(screensaver_start_ms) && (now_ms - tap_ms) > 500) {
              int mode = id(screensaver_mode);
              ESP_LOGI("screen", "SCREENSAVER TAP → WAKE (mode=%d)", mode);
              if (mode == 1) {
                lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              } else if (mode == 2) {
                id(lvgl_comp)->show_page(id(screensaver_prev_page), LV_SCR_LOAD_ANIM_NONE, 0);
              }
              id(backlight).set_level(id(screen_brightness_pct) / 100.0f);
              id(backlight).turn_on();
              id(screen_state) = 0;
              tap_ms = 0;
              lv_disp_trig_activity(NULL);
            }
            prev_idle = idle;
          }

          // GPIO4 wake (OFF state only)
          if (state == 3) {
            if (off_since == 0) off_since = now_ms;
            // Ignore touch interrupts for first 10s after screen off
            if (now_ms - off_since < 10000) return;
            int gpio4 = gpio_get_level(GPIO_NUM_4);
            if (gpio4 == 0) {
              wake_count++;
              if (wake_count >= 2) {
                // GPIO4 LOW for 2 consecutive polls (100ms) — real touch
                ESP_LOGW("screen", "WAKE: GPIO4 LOW x%d (off for %lums)", wake_count, (unsigned long)(now_ms - off_since));
                id(backlight).set_level(id(screen_brightness_pct) / 100.0f);
                id(backlight).turn_on();
                id(lvgl_comp)->set_paused(false, false);
                id(screen_state) = 0;
                off_since = 0;
                wake_count = 0;
              }
            } else {
              wake_count = 0;
            }
          }
  - interval: 500ms
    then:
      - lambda: |-
          int state = id(screen_state);
          if (state >= 3) return;  // OFF: handled by 50ms GPIO poll

          if (id(settings_visible) || id(bat_alarm_active)) return;

          uint32_t idle_ms = lv_disp_get_inactive_time(NULL);
          int dim_s = id(dim_timeout_sec);
          int off_s = id(off_timeout_sec);

          // SCREENSAVER active: auto-off after 5 minutes
          if (state == 2) {
            uint32_t elapsed = millis() - id(screensaver_start_ms);
            if (elapsed > 300000) {
              ESP_LOGI("screen", "SCREENSAVER → OFF (5min timeout)");
              if (id(screensaver_mode) == 1) {
                lv_obj_add_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              }
              id(backlight).set_level(0.0);
              id(backlight).turn_off();
              id(lvgl_comp)->set_paused(true, false);
              id(screen_state) = 3;
            }
            return;
          }

          // ON/DIM → SCREENSAVER (when off timeout reached)
          if (off_s > 0 && idle_ms >= (uint32_t)(off_s * 1000) && state < 2) {
            int mode = id(screensaver_mode);
            if (id(auto_night_mode) && mode != 0) {
              auto time = id(sntp_time).now();
              if (time.is_valid() && (time.hour >= 21 || time.hour < 7)) {
                mode = 0;  // Force screensaver off at night
              }
            }
            if (mode == 0) {
              // Off: skip screensaver, go straight to OFF
              ESP_LOGI("screen", "IDLE → OFF (screensaver disabled)");
              id(backlight).set_level(0.0);
              id(backlight).turn_off();
              id(lvgl_comp)->set_paused(true, false);
              id(screen_state) = 3;
            } else if (mode == 1) {
              // Clock: existing behavior
              ESP_LOGI("screen", "SCREENSAVER (clock): idle=%ums off_timeout=%ds", idle_ms, off_s);
              lv_obj_clear_flag(id(clock_screensaver), LV_OBJ_FLAG_HIDDEN);
              id(backlight).set_level(id(saver_brightness_pct) / 100.0f);
              id(screen_state) = 2;
              id(screensaver_start_ms) = millis();
            } else {
              // Flow: navigate to flow page at screensaver brightness
              ESP_LOGI("screen", "SCREENSAVER (flow): idle=%ums off_timeout=%ds", idle_ms, off_s);
              id(screensaver_prev_page) = id(lvgl_comp)->get_current_page();
              id(lvgl_comp)->show_page(15, LV_SCR_LOAD_ANIM_NONE, 0);
              id(backlight).set_level(id(saver_brightness_pct) / 100.0f);
              id(screen_state) = 2;
              id(screensaver_start_ms) = millis();
            }
            return;
          }

          // ON → DIM
          if (dim_s > 0 && idle_ms >= (uint32_t)(dim_s * 1000) && state == 0) {
            ESP_LOGI("screen", "DIM: idle=%ums dim_timeout=%ds", idle_ms, dim_s);
            id(backlight).set_level(0.15);
            id(screen_state) = 1;
          }

          // DIM → ON (touch while dimmed)
          if (state == 1 && dim_s > 0 && idle_ms < (uint32_t)(dim_s * 1000)) {
            ESP_LOGI("screen", "UNDIM: idle=%ums (touch while dimmed)", idle_ms);
            id(backlight).set_level(id(screen_brightness_pct) / 100.0f);
            id(screen_state) = 0;
          }

  - interval: 2s
    then:
      - lambda: |-
          // --- Power Flow page + sub-page updates ---
          char buf[32];

          // --- Offline detection (120s threshold) ---
          uint32_t now = millis();
          bool mppt_online = (id(mppt_last_ms) != 0 && (now - id(mppt_last_ms)) < 120000);
          bool shunt_online = (id(shunt_last_ms) != 0 && (now - id(shunt_last_ms)) < 120000);
          bool charger_online = (id(charger_last_ms) != 0 && (now - id(charger_last_ms)) < 120000);
          bool all_offline = !mppt_online && !shunt_online && !charger_online;
          lv_color_t grey = lv_color_hex(0x555555);

          // Grey out icons for offline devices
          lv_obj_set_style_text_color(id(flow_solar_icon), mppt_online ? lv_color_hex(0xFFCC00) : grey, 0);
          lv_obj_set_style_text_color(id(flow_battery_icon), shunt_online ? lv_color_hex(0x00CC66) : grey, 0);
          lv_obj_set_style_text_color(id(flow_mains_icon), charger_online ? lv_color_hex(0x00CCCC) : grey, 0);

          // Grey out labels for offline devices
          lv_obj_set_style_text_color(id(flow_solar_label), mppt_online ? lv_color_hex(0xFFCC00) : grey, 0);
          lv_obj_set_style_text_color(id(flow_battery_label), shunt_online ? lv_color_hex(0x00CC66) : grey, 0);
          lv_obj_set_style_text_color(id(flow_mains_label), charger_online ? lv_color_hex(0x00CCCC) : grey, 0);
          // Van depends on shunt (load data comes from shunt current)
          lv_obj_set_style_text_color(id(flow_van_icon), shunt_online ? lv_color_hex(0xFF8800) : grey, 0);
          lv_obj_set_style_text_color(id(flow_van_label), shunt_online ? lv_color_hex(0xFF8800) : grey, 0);

          // Show/hide "No Connected Devices" label
          if (all_offline) {
            lv_obj_clear_flag(id(flow_no_devices_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(flow_ttg_title), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(flow_ttg_label), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(flow_no_devices_label), LV_OBJ_FLAG_HIDDEN);
          }

          // Read sensors (NaN if not yet received)
          float pv_power = id(mppt_pv_power).state;
          float mains_power = id(mains_battery_power).state;
          float shunt_v = id(shunt_voltage).state;
          float shunt_i = id(shunt_current).state;
          float soc = id(shunt_soc).state;
          float mppt_i = id(mppt_battery_current).state;
          float mains_i = id(mains_battery_current).state;
          float ttg = id(shunt_ttg).state;

          // --- Flow page labels (amps) ---
          if (std::isnan(mppt_i)) {
            lv_label_set_text(id(flow_solar_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", mppt_i);
            lv_label_set_text(id(flow_solar_label), buf);
          }

          if (std::isnan(soc)) {
            lv_label_set_text(id(flow_battery_label), "-- %");
          } else {
            snprintf(buf, sizeof(buf), "%.0f %%", soc);
            lv_label_set_text(id(flow_battery_label), buf);
          }

          if (std::isnan(mains_i)) {
            lv_label_set_text(id(flow_mains_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", mains_i);
            lv_label_set_text(id(flow_mains_label), buf);
          }

          // Van load current = MPPT battery current + Mains battery current - Shunt current
          float van_i = NAN;
          if (!std::isnan(shunt_i)) {
            float mi = std::isnan(mppt_i) ? 0.0f : mppt_i;
            float ci = std::isnan(mains_i) ? 0.0f : mains_i;
            van_i = mi + ci - shunt_i;
            if (van_i < 0) van_i = 0;
          }
          if (std::isnan(van_i)) {
            lv_label_set_text(id(flow_van_label), "-- A");
          } else {
            snprintf(buf, sizeof(buf), "%.1f A", van_i);
            lv_label_set_text(id(flow_van_label), buf);
          }

          // --- Battery icon: charging vs normal ---
          if (!std::isnan(shunt_i) && shunt_i > 0) {
            lv_label_set_text(id(flow_battery_icon), "\U000F008E");  // mdi-battery-charging
          } else {
            lv_label_set_text(id(flow_battery_icon), "\U000F0079");  // mdi-battery
          }

          // --- Flow line colors (amps threshold) ---
          lv_color_t idle = lv_color_hex(0x333333);
          // Solar line: yellow when > 0.1A
          if (!std::isnan(mppt_i) && mppt_i > 0.1f) {
            lv_obj_set_style_bg_color(id(flow_line_solar), lv_color_hex(0xFFCC00), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_line_solar), idle, 0);
          }
          // Van line: orange when van load > 0.1A
          if (!std::isnan(van_i) && van_i > 0.1f) {
            lv_obj_set_style_bg_color(id(flow_line_van), lv_color_hex(0xFF8800), 0);
          } else {
            lv_obj_set_style_bg_color(id(flow_line_van), idle, 0);
          }
          // Mains line: cyan when mains > 0.1A
