esphome:
  name: esphome-web-2a4114
  friendly_name: Campervan32
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    - priority: -100
      then:
        - delay: 300ms
        - lambda: |-
            id(touch_glue).begin();
            // Sync dropdown selections with restored global values
            int dim_vals[] = {0, 15, 30, 60, 120};
            for (int i = 0; i < 5; i++) {
              if (dim_vals[i] == id(dim_timeout_sec)) {
                lv_dropdown_set_selected(id(dim_dropdown).obj, i);
                break;
              }
            }
            int off_vals[] = {0, 30, 60, 120, 300};
            for (int i = 0; i < 5; i++) {
              if (off_vals[i] == id(off_timeout_sec)) {
                lv_dropdown_set_selected(id(off_dropdown).obj, i);
                break;
              }
            }

packages:
  waveshare_display: github://gjdodd/esphome-packages/waveshare-esp32-s3-touch-lcd-146b.yaml@main

globals:
  - id: screen_state
    type: int
    restore_value: no
    initial_value: '0'
  - id: dim_timeout_sec
    type: int
    restore_value: yes
    initial_value: '30'
  - id: off_timeout_sec
    type: int
    restore_value: yes
    initial_value: '60'
  - id: settings_visible
    type: bool
    restore_value: no
    initial_value: 'false'

i2c:
  frequency: 400kHz

external_components:
  - source: components
  - source: github://Fabian-Schmidt/esphome-victron_ble
    components: [victron_ble]

spd2010_glue:
  id: touch_glue
  width: 412
  height: 412
  int_gpio: 4
  swap_xy: false
  mirror_x: true
  mirror_y: true

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: "192.168.0.161"
    gateway: "192.168.0.1"
    subnet: "255.255.255.0"
    dns1: "192.168.0.1"
    dns2: "8.8.8.8"

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: false

victron_ble:
  - id: victron_mppt
    mac_address: !secret victron_mppt_mac
    bindkey: !secret victron_mppt_bindkey
  - id: victron_shunt
    mac_address: !secret victron_shunt_mac
    bindkey: !secret victron_shunt_bindkey
  - id: victron_charger
    mac_address: !secret victron_charger_mac
    bindkey: !secret victron_charger_bindkey

font:
  - file: "gfonts://Roboto"
    id: roboto32
    size: 32
    bpp: 4
  - file: "gfonts://Roboto"
    id: roboto48
    size: 48
    bpp: 4
